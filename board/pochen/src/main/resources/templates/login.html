<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>

<h2>로그인</h2>

<form id="loginForm">
    <div>
        <label>아이디</label><br>
        <input type="text" id="userId" placeholder="아이디 입력" required>
    </div>
    <br>
    <div>
        <label>비밀번호</label><br>
        <input type="password" id="userPwd" placeholder="비밀번호 입력" required>
    </div>
    <br>
    <button type="submit">로그인</button>
</form>

<script>
    document.getElementById("loginForm").addEventListener("submit", function(e) {

        e.preventDefault();

        const data = {
            id: document.getElementById("userId").value,
            pwd: document.getElementById("userPwd").value
        };

        fetch("/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        })
        .then(response => response.text())
        .then(result => {
            alert(result);
        })
        .catch(error => {
            console.error("Error:", error);
        });

    });
</script>

</body>
</html>
